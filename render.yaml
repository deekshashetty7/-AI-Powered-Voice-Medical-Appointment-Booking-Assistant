# Render.com deployment blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: medivoice-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run db:generate && npm run build
    startCommand: npm run db:push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_INVITE_CODE
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: medivoice-agent
    runtime: docker
    rootDir: agent-node
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: BACKEND_URL
        fromService:
          name: medivoice-backend
          type: web
          property: host
